
# azure-pipelines.yml
trigger:
  branches:
    include:
      - development   # Run pipeline when code is pushed to main

pool:
  vmImage: 'windows-latest'   # Use Windows agent for .NET builds
  name: Default

variables:
  buildConfiguration: 'Release'

steps:
  - task: NuGetToolInstaller@1
  - task: NuGetCommand@2
    inputs:
      restoreSolution: '**/*.sln'

   - task: VSBuild@1
    inputs:
      solution: '**/*.sln'
      msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfiguration=true /p:PackageLocation=$(Build.ArtifactStagingDirectory)'
      platform: 'Any CPU'
      configuration: 'Release'
  - task: VSTest@2
    inputs:
      platform: 'Any CPU'
      configuration: 'Release'
  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: 'drop'
      publishLocation: 'Container'
