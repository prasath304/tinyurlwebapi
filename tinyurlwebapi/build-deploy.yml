name : tiny web api CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]  

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: 'Release' 
  publish_dir: 'publish'
  artifact_name: 'tinyurlwebapi'
  azure_webapp_name: 'tinyurlwebapi'
  azure_resource_group: 'tinyurlwebapi-rg'
  azure_subscription: 'tinyurlwebapi-subscription'
  azure_webapp_package: '$(System.DefaultWorkingDirectory)/$(publish_dir)/*.zip'
  api_project: 'TinyUrlWebApi/TinyUrlWebApi.csproj'
  solution_file: 'TinyUrlWebApi.sln'
  jobs:
  - job: Build
    displayName: 'Build and Publish'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: UseDotNet@2
      displayName: 'Use .NET SDK $(DOTNET_VERSION)'
      inputs:
        packageType: 'sdk'
        version: '$(DOTNET_VERSION)'

    - script: dotnet build $(solution_file) --configuration $(BUILD_CONFIGURATION)
      displayName: 'Build Solution'

    - script: dotnet publish $(api_project) --configuration $(BUILD_CONFIGURATION) --output $(publish_dir)
      displayName: 'Publish API Project'

    - task: ArchiveFiles@2
      displayName: 'Archive Published Files'
      inputs:
        rootFolderOrFile: '$(publish_dir)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(System.DefaultWorkingDirectory)/$(publish_dir)/$(artifact_name).zip'
        replaceExistingArchive: true

    - publish: '$(System.DefaultWorkingDirectory)/$(publish_dir)/$(artifact_name).zip'
      artifact: '$(artifact_name)'
     